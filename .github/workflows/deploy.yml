name: Deploy to EC2

on:
  push:
    branches: [ "master" ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.7'

      - name: Go tests
        working-directory: ./backend
        run: go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        working-directory: ./frontend
        run: |
          npm ci
          npm test -- --watchAll=false --passWithNoTests

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            export PATH=$PATH:/usr/local/go/bin

            cd /home/ubuntu/app

            # Pull latest code
            git pull

            # Rebuild backend
            cd /home/ubuntu/app/backend
            /usr/local/go/bin/go build -buildvcs=false -o kyron-medical .

            # Rebuild frontend
            cd /home/ubuntu/app/frontend
            npm ci
            npm run build

            # Restart services
            sudo systemctl restart kyron-medical
            pm2 restart kyron-frontend
